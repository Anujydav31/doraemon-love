        function createReasons() {
            const container = document.getElementById('reasons-container');
            fullReasons.forEach((reason, index) => {
                const card = document.createElement('div');
                card.className = 'nickname-card reason-card';
                card.innerHTML = `
                    <div style="font-size: 3rem; cursor: pointer;" onclick="showReason(${index})">💖</div>
                    <h4>Reason ${index + 1}</h4>
                    <p style="font-size: 0.9rem; color: #7f8c8d;">Click to reveal!</p>
                `;
                container.appendChild(card);
            });
        }

        function showReason(index) {
            const reason = fullReasons[index];
            document.getElementById('reason-title').textContent = `Reason ${index + 1}`;
            document.getElementById('reason-text').textContent = reason;
            document.getElementById('current-reason').style.display = 'block';
            document.getElementById('current-reason').scrollIntoView({ behavior: 'smooth' });
        }

        function revealAll() {
            const cards = document.querySelectorAll('.reason-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    showReason(index);
                }, index * 50);
            });
        }

        function randomReason() {
            const randomIndex = Math.floor(Math.random() * fullReasons.length);
            showReason(randomIndex);
        }
